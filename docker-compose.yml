version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: studytogether-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-studytogether}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-studytogether_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-studytogether}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studytogether"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend disabled - run locally instead:
  # cd backend && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
